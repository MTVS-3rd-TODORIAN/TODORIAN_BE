server:
  servlet:
    encoding:
      charset: utf-8
      force: true
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL}?allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: ${DRIVER-CLASS-NAME}
    username: ${USERNAME}
    password: ${PASSWORD}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
      default_batch_fetch_size: 100
    open-in-view: false
  data:
    storage-type: redis
    redis:
      host: redis-service
      port: 6379

jwt:
  secret: ${JWT.SECRET}

logging:
  level:
    '[com.example.kakao]': DEBUG
    '[org.hibernate.type]': TRACE